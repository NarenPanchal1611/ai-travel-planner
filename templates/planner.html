<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Planner</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #ff7e5f;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #ff7e5f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #e96a50;
            transform: scale(1.05);
        }

        .back {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #ff7e5f;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>✈️ Plan Your Trip</h2>

    <form method="POST">
        <input type="number" name="budget" placeholder="Enter Budget (₹)" required>

        <input type="number" name="days" placeholder="Number of Days" required>

        <input type="text" name="interests" placeholder="Interests (beach, food, temple...)" required>

        <button type="submit">Generate Plan</button>
    </form>

    <a href="/dashboard" class="back">⬅ Back to Dashboard</a>
</div>

</body>
</html>
