<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Travel Planner</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: gray;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .login {
            background-color: #4facfe;
            color: white;
        }

        .signup {
            background-color: #00c853;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌍 AI Travel Planner</h1>
        <p>Plan your trips smartly with AI-powered recommendations</p>

        <a href="/login">
            <button class="btn login">Login</button>
        </a>

        <a href="/signup">
            <button class="btn signup">Signup</button>
        </a>
    </div>

</body>
</html>
